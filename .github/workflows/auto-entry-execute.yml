name: Auto-Entry Execute

on:
  schedule:
    - cron: "*/5 13-21 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: autotrade-execute
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Call auto-entry execute
        env:
          PROD: https://cecil-investments-day-trading.vercel.app
          AUTO_ENTRY_TOKEN: ${{ secrets.AUTO_ENTRY_TOKEN }}
          CRON_TOKEN: ${{ secrets.CRON_TOKEN }}
        run: |
          set -euo pipefail

          RUN_ID="gh-auto-entry-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-$(date +%s)"

          SEED_CODE="$(curl -sS -o /tmp/auto_entry_seed.json -w "%{http_code}" -X POST "$PROD/api/auto-entry/seed-from-signals?limit=3" \
            -H "Content-Type: application/json" \
            -H "x-cron-token: $CRON_TOKEN" \
            -H "x-run-source: github-actions" \
            -H "x-run-id: $RUN_ID" \
            -d '{}')"

          echo "seed HTTP $SEED_CODE"
          cat /tmp/auto_entry_seed.json | head -c 6000 || true
          echo
          cat /tmp/auto_entry_seed.json | jq '{totalQualifiedSignals,freshQualifiedSignals,staleQualifiedSignals,totalCandidates,createdCount,skippedQualifiedSignals,skipReasonCounts,staleThresholdUsedMs,marketOpen,runAt,runId,source}' || true

          EXEC_CODE="$(curl -sS -o /tmp/auto_entry_execute.json -w "%{http_code}" -X POST "$PROD/api/auto-entry/execute" \
            -H "Content-Type: application/json" \
            -H "x-auto-entry-token: $AUTO_ENTRY_TOKEN" \
            -H "x-run-source: github-actions" \
            -H "x-run-id: $RUN_ID" \
            -d '{}' )"

          echo "execute HTTP $EXEC_CODE"
          cat /tmp/auto_entry_execute.json | head -c 4000 || true
          echo
          cat /tmp/auto_entry_execute.json | jq '{ok,summary,error,reason,skipped,pendingCount,eligibleCount,runId}' || true

      - name: Call auto-manage run (3x ~2m cadence)
        env:
          PROD: https://cecil-investments-day-trading.vercel.app
          CRON_TOKEN: ${{ secrets.CRON_TOKEN }}
        run: |
          set -euo pipefail

          for i in 1 2 3; do
            RUN_ID="gh-auto-manage-$i-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-$(date +%s)"

            BODY="$(curl -sS -X POST "$PROD/api/auto-manage/run" \
              -H "Content-Type: application/json" \
              -H "x-cron-token: $CRON_TOKEN" \
              -H "x-run-source: github-actions" \
              -H "x-run-id: $RUN_ID" \
              -d '{}' )"

            echo "$BODY"
            echo "$BODY" | jq -r '.' >/dev/null

            if [ "$i" -lt 3 ]; then
              sleep 120
            fi
          done
