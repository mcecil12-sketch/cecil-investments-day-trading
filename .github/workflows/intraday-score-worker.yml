name: intraday-score-worker

on:
  schedule:
    # Run every 5 minutes on weekday daytime UTC; market-open API check gates trading actions.
    - cron: "*/5 13-21 * * 1-5"
  workflow_dispatch:

jobs:
  score:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker: [1, 2, 3]
    steps:
      - name: Intraday scoring worker
        env:
          BASE: ${{ secrets.PROD_BASE_URL }}
          CRON_TOKEN: ${{ secrets.CRON_TOKEN }}
          AUTO_ENTRY_TOKEN: ${{ secrets.AUTO_ENTRY_TOKEN }}
        run: |
          set -euo pipefail
          NOW="$(date +%s)"
          RUN_ID="gha-intraday-score-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-w${{ matrix.worker }}-${NOW}"

          OPS="$(curl -sS "$BASE/api/ops/status?_=$NOW")"
          IS_OPEN="$(echo "$OPS" | jq -r '.market.is_open // false')"
          if [ "$IS_OPEN" != "true" ]; then
            echo "market_closed; exiting"
            exit 0
          fi

          echo "RUN_ID=$RUN_ID"
          echo "drain recent-first (intraday), worker=${{ matrix.worker }}"

          DRAIN_CODE="$(curl -sS --max-time 90 -o /tmp/intraday_drain_${{ matrix.worker }}.json -w "%{http_code}" -X POST \
            "$BASE/api/ai/score/drain?limit=2&releaseLimit=0&budgetMs=90000&recentWindowHours=48&_=$NOW" \
            -H "x-cron-token: $CRON_TOKEN" \
            -H "x-run-source: github-actions" \
            -H "x-run-id: $RUN_ID" \
            -H "Content-Type: application/json" \
            -d '{}')"
          echo "drain HTTP $DRAIN_CODE"
          cat /tmp/intraday_drain_${{ matrix.worker }}.json | head -c 4000 || true
          echo
          cat /tmp/intraday_drain_${{ matrix.worker }}.json | jq '{attemptedCount,completedCount,timeoutCount,scoredCount,durationMs,remainingTimeMs,pickedStrategy}' || true

          if [ "${{ matrix.worker }}" = "1" ]; then
            echo "seed-from-signals after score drain"
            SEED_CODE="$(curl -sS --max-time 90 -o /tmp/intraday_seed.json -w "%{http_code}" -X POST \
              "$BASE/api/auto-entry/seed-from-signals?limit=3&_=$NOW" \
              -H "x-cron-token: $CRON_TOKEN" \
              -H "x-run-source: github-actions" \
              -H "x-run-id: $RUN_ID" \
              -H "Content-Type: application/json" \
              -d '{}')"
            echo "seed HTTP $SEED_CODE"
            cat /tmp/intraday_seed.json | head -c 6000 || true
            echo
            cat /tmp/intraday_seed.json | jq '{ok,totalQualifiedSignals,freshQualifiedSignals,staleQualifiedSignals,totalCandidates,createdCount,skippedQualifiedSignals,skipReasonCounts,staleThresholdUsedMs,marketOpen,runAt,runId,source}' || true

            echo "execute after seed"
            EXEC_CODE="$(curl -sS --max-time 90 -o /tmp/intraday_execute.json -w "%{http_code}" -X POST \
              "$BASE/api/auto-entry/execute?_=$NOW" \
              -H "x-auto-entry-token: $AUTO_ENTRY_TOKEN" \
              -H "x-run-source: github-actions" \
              -H "x-run-id: $RUN_ID" \
              -H "Content-Type: application/json" \
              -d '{}')"
            echo "execute HTTP $EXEC_CODE"
            cat /tmp/intraday_execute.json | head -c 4000 || true
            echo
            cat /tmp/intraday_execute.json | jq '{ok,summary,error,reason,skipped,pendingCount,eligibleCount}' || true
          fi
